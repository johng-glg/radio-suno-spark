project_id = "kbvsckoacdgpgiiqrhqv"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
port = 9999
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://a3e168f8-40c9-4243-841b-80ad45ef9489.lovableproject.com"]
jwt_expiry = 3600
enable_signup = true

[functions.generate-music]
verify_jwt = true

# All functions require a valid JWT (the platform anon key passes verification,
# so pg_cron jobs that send the anon key keep working — but bare, keyless
# invocations from the open internet are rejected).
[functions.build-prompt]
verify_jwt = true

[functions.check-pending-songs]
verify_jwt = true

[functions.complete-pending-generations]
verify_jwt = true

[functions.check-stuck-songs]
verify_jwt = true

[functions.fetch-missing-images]
verify_jwt = true

[functions.seed-music-samples]
verify_jwt = true

[functions.api-status]
verify_jwt = true
